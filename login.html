<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sosial</title>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-name">Sosial</span>
    </div>
  </header>

  <main>
    <section class="login-card">

      <h1>Masuk ke Akunmu</h1>
      <p class="subtitle">Selamat datang kembali</p>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@email.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" />
      </div>

      <div class="forgot">
        <a href="forgot-password.html">Lupa password?</a>
      </div>

      <button type="button" class="btn-primary">Masuk</button>

      <div class="divider">
        <span>atau</span>
      </div>

      <button type="button" class="btn-google">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" width="20" height="20" />
        Masuk dengan Google
      </button>

      <p class="register-link">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </p>

    </section>
  </main>

  <footer>
    <p>© 2024 Sosial. Semua hak dilindungi.</p>
  </footer>

</body>
</html>
