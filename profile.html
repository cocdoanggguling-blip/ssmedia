<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil — Sosial</title>
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="home.html" class="logo"><span class="logo-icon">◈</span><span class="logo-name">Sosial</span></a>
    </div>
    <div class="nav-center">
      <input type="text" class="search-input" placeholder="Cari..." />
    </div>
    <div class="nav-right">
      <a href="home.html" class="nav-link">🏠</a>
      <a href="explore.html" class="nav-link">🔍</a>
      <a href="notifications.html" class="nav-link">🔔</a>
      <a href="messages.html" class="nav-link">💬</a>
      <a href="profile.html" class="nav-link active">👤</a>
    </div>
  </nav>

  <main class="profile-main">

    <section class="profile-header">
      <div class="cover-photo">
        <img src="https://picsum.photos/seed/cover1/1200/300" alt="Foto Sampul" class="cover-img" />
      </div>
      <div class="profile-info">
        <div class="avatar-wrap">
          <img src="https://i.pravatar.cc/100?img=1" alt="Avatar" class="profile-avatar" />
        </div>
        <div class="profile-details">
          <h1 class="profile-name">Andi Pratama</h1>
          <p class="profile-username">@andipratama</p>
          <p class="profile-bio">Desainer UI/UX. Suka kopi & kode. ☕</p>
          <div class="profile-stats">
            <span><strong id="postCount">0</strong> Postingan</span>
            <span><strong>3.4K</strong> Pengikut</span>
            <span><strong>210</strong> Mengikuti</span>
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn-edit" onclick="openEditModal()">✏️ Edit Profil</button>
        </div>
      </div>
    </section>

    <section class="profile-tabs">
      <button class="tab-btn active" onclick="switchTab('posts', this)">📝 Postingan</button>
      <button class="tab-btn" onclick="switchTab('photos', this)">📷 Foto</button>
    </section>

    <section id="tab-posts" class="tab-content">
      <div id="postFeed" class="post-feed"></div>
    </section>

    <section id="tab-photos" class="tab-content hidden">
      <div id="photoGrid" class="photo-grid"></div>
    </section>

  </main>

  <!-- Modal Edit Profil -->
  <div id="editModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeEditModal()"></div>
    <div class="modal-box">
      <h2>Edit Profil</h2>
      <div class="field">
        <label>Nama</label>
        <input type="text" id="editName" value="Andi Pratama" />
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="editUsername" value="andipratama" />
      </div>
      <div class="field">
        <label>Bio</label>
        <textarea id="editBio">Desainer UI/UX. Suka kopi & kode. ☕</textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveProfile()">Simpan</button>
        <button class="btn-cancel" onclick="closeEditModal()">Batal</button>
      </div>
    </div>
  </div>

  <script src="profile.js"></script>
</body>
</html>
