<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifikasi — Sosial</title>
  <link rel="stylesheet" href="notifications.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-left">
      <a href="home.html" class="logo"><span class="logo-icon">◈</span><span class="logo-name">Sosial</span></a>
    </div>
    <div class="nav-center">
      <input type="text" class="search-input" placeholder="Cari..." />
    </div>
    <div class="nav-right">
      <a href="home.html" class="nav-link">🏠</a>
      <a href="explore.html" class="nav-link">🔍</a>
      <a href="notifications.html" class="nav-link active">🔔</a>
      <a href="messages.html" class="nav-link">💬</a>
      <a href="profile.html" class="nav-link">👤</a>
    </div>
  </nav>

  <main class="notif-main">
    <div class="notif-header">
      <h1>Notifikasi</h1>
      <button class="btn-read-all" onclick="markAllRead()">Tandai semua dibaca</button>
    </div>

    <div class="notif-tabs">
      <button class="tab-btn active" onclick="filterNotif('all', this)">Semua</button>
      <button class="tab-btn" onclick="filterNotif('like', this)">❤️ Suka</button>
      <button class="tab-btn" onclick="filterNotif('comment', this)">💬 Komentar</button>
      <button class="tab-btn" onclick="filterNotif('follow', this)">👤 Ikuti</button>
    </div>

    <div id="notifList" class="notif-list"></div>
  </main>

  <script src="notifications.js"></script>
</body>
</html>
